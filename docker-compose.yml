services:

  # ---------------------------------------------------------------------------
  # API principal — FastAPI + LangGraph
  # ---------------------------------------------------------------------------
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insurance_agents}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7
  # DB 0: estado de conversas (API)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Scheduler — CRON de renovações (08:00 BRT)
  # ---------------------------------------------------------------------------
  scheduler:
    build: .
    command: python -m services.scheduler_service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # V1+ — Neo4j (Graph Memory)
  # Descomentar ao iniciar desenvolvimento da V1 (mês 6).
  # ---------------------------------------------------------------------------
  # neo4j:
  #   image: neo4j:5-community
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-brokerai}
  #     NEO4J_PLUGINS: '["apoc"]'
  #   volumes:
  #     - neo4j_data:/data
  #   healthcheck:
  #     test: ["CMD", "neo4j", "status"]
  #     interval: 10s
  #     timeout: 10s
  #     retries: 5

volumes:
  postgres_data:
  redis_data:
